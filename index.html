<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Tính CI/CD Lab</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator-card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .button-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 0;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #0366d6;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #024ea4;
        }
        .result-box {
            background-color: #e6f7ff;
            border: 1px solid #91d5ff;
            padding: 15px;
            border-radius: 6px;
            color: #0050b3;
            font-size: 18px;
            font-weight: bold;
            min-height: 25px;
        }
        .error {
            background-color: #fff2f0;
            border-color: #ffccc7;
            color: #cf1322;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Máy Tính Ứng Dụng</h2>
    
    <div class="input-group">
        <label for="numA">Số A:</label>
        <input type="number" id="numA" placeholder="Nhập số A...">
    </div>
    
    <div class="input-group">
        <label for="numB">Số B:</label>
        <input type="number" id="numB" placeholder="Nhập số B...">
    </div>

    <div class="button-group">
        <button onclick="calculate('add')">+</button>
        <button onclick="calculate('subtract')">-</button>
        <button onclick="calculate('multiply')">×</button>
        <button onclick="calculate('divide')">÷</button>
    </div>

    <div id="resultDisplay" class="result-box">
        Kết quả sẽ hiển thị ở đây
    </div>
</div>

<script>
    function calculate(operation) {
        const numA = parseFloat(document.getElementById('numA').value);
        const numB = parseFloat(document.getElementById('numB').value);
        const resultDisplay = document.getElementById('resultDisplay');

        // Xóa class lỗi nếu có
        resultDisplay.classList.remove('error');

        // Kiểm tra đầu vào hợp lệ
        if (isNaN(numA) || isNaN(numB)) {
            resultDisplay.textContent = "Vui lòng nhập đầy đủ hai số!";
            resultDisplay.classList.add('error');
            return;
        }

        let result = 0;
        let symbol = '';

        switch (operation) {
            case 'add':
                result = numA + numB;
                symbol = '+';
                break;
            case 'subtract':
                result = numA - numB;
                symbol = '-';
                break;
            case 'multiply':
                result = numA * numB;
                symbol = '×';
                break;
            case 'divide':
                if (numB === 0) {
                    resultDisplay.textContent = "Lỗi: Không thể chia cho 0 (Divide by zero)";
                    resultDisplay.classList.add('error');
                    return;
                }
                result = numA / numB;
                symbol = '÷';
                break;
        }

        resultDisplay.textContent = `Kết quả: ${numA} ${symbol} ${numB} = ${result}`;
    }
</script>

</body>
</html>
